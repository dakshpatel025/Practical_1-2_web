<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family details</title>
    <link rel="stylesheet" href="../css/family_style.css">
</head>
<body>
    
    <h1 id="main_box"> Family Details</h1>

     <div>
            <div id="father_adjust">
            <label class="detail">Father name : </label>
            <input type="text" placeholder="First name" class="last">
            <input type="text" placeholder="middle name" class="last">
            <input type="text" placeholder="last name" class="last">
            <label class="detail"> Father Photo : </label>
            <a href="http://www.google.com" class="photo"> <p>Father Photo</p></a>
            </div>
            <div>
                <label class="detail">Father mobile : </label>
                <input type="text" placeholder="mobile" class="last">
            </div>
            
            <div id="mother_adjust">
            <label class="detail">Mother name :</label>
            <input type="text" placeholder="First name" class="last">
            <input type="text" placeholder="middle name" class="last">
            <input type="text" placeholder="last name" class="last">
            <label class="detail"> Father Photo : </label>
            <a href="http://www.google.com" class="photo"> <p>Mother Photo</p></a>
            </div>
            <div>
                <label class="detail">Mother mobile : </label>
                <input type="text" placeholder="mobile" class="last">
            </div>

            <br />
    </div>

    <div>
        <footer class="fot" style="color: rgb(255, 255, 255);"> © 2018 Charotar University of Science & Technology. All Rights Reserved </footer>
    </div>
</body>
</html>
